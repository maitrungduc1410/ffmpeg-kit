name: android build scripts

on:
  push:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/android-build-scripts.yml'
      - 'android/**'
      - '!android/README.md'
      - 'scripts/**'
      - 'tools/**'
      - 'android.sh'
  pull_request:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/android-build-scripts.yml'
      - 'android/**'
      - '!android/README.md'
      - 'scripts/**'
      - 'tools/**'
      - 'android.sh'

jobs:
  build-main-on-linux:
    name: android main on linux
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ndk-version: ['r27c-linux'] # use r27c to support 16kb page size
        ffmpeg-version: [ 'audio' ]
        # ffmpeg-version: [ 'min', 'https', 'audio', 'video', 'full' ]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: set up adopt jdk 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'
      # the audio/video/full packages build extra external libraries (autotools/meson/nasm based)
      # so we install the same toolchain used by the nightly builds
      - name: install build tools for external libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config curl git doxygen nasm cmake gcc gperf texinfo yasm bison autogen wget autopoint meson ninja-build ragel groff gtk-doc-tools libtasn1-bin
          python3 -m pip install --upgrade meson
      - name: prerequisites
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --uninstall "cmake;3.10.2.4988404" "cmake;3.18.1"
      - name: set up android ndk
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-${{ matrix.ndk-version }}.zip" -o ndk.zip
          unzip -q -o ndk.zip -d .ndk
          echo "ANDROID_NDK_ROOT=$PWD/.ndk/$(ls .ndk)" >> $GITHUB_ENV
      - name: run the build script
        # gnutls + gmp build to support https is not working because of some build issues ("clang: "all" is not a valid value for -march"). Hence we need to use openssl here. But openssl does not support x86 and x86_64 architectures.
        # the proportion of x86 and x86_64 is very low, so we disable them to support https + speed up the build + minimize the size of the aar
        run: |
          COMMON_FLAGS="--enable-android-media-codec --enable-android-zlib --disable-arm-v7a --disable-x86 --disable-x86-64"
          # external libraries for each package, matching the ffmpeg-kit "audio"/"video"/"full" package definitions (README section "Packages")
          AUDIO_FLAGS="--enable-lame --enable-libilbc --enable-libvorbis --enable-opencore-amr --enable-opus --enable-shine --enable-soxr --enable-speex --enable-twolame --enable-vo-amrwbenc"
          VIDEO_FLAGS="--enable-dav1d --enable-fontconfig --enable-freetype --enable-fribidi --enable-kvazaar --enable-libass --enable-libiconv --enable-libtheora --enable-libvpx --enable-libwebp --enable-snappy --enable-zimg"
          case "${{ matrix.ffmpeg-version }}" in
            min)
              ./android.sh $COMMON_FLAGS
              ;;
            https)
              ./android.sh $COMMON_FLAGS --enable-openssl
              ;;
            audio)
              ./android.sh $COMMON_FLAGS $AUDIO_FLAGS
              ;;
            video)
              ./android.sh $COMMON_FLAGS $VIDEO_FLAGS
              ;;
            full)
              # the official "full" package bundles gmp + gnutls for https. gnutls/gmp fail to build with this NDK
              # (the "-march=all" clang error mentioned above), so we substitute openssl just like the https build.
              ./android.sh $COMMON_FLAGS $AUDIO_FLAGS $VIDEO_FLAGS --enable-libxml2 --enable-openssl
              ;;
          esac
      - name: list files in prebuilt folder
        run: ls -l prebuilt
      - name: print build logs
        if: ${{ always() }}
        run: cat build.log
      - name: print ffbuild logs
        if: ${{ failure() }}
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -50 ./src/ffmpeg/ffbuild/config.log'
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.ffmpeg-version }}-aar
          path: |
            prebuilt/bundle-android-aar

