name: publish

# Manual-only release workflow. It does NOT build anything: it reuses the
# artifacts produced by the latest successful build workflows and publishes them.
#   * iOS: zips the xcframeworks ("ios build scripts" run) to a GitHub Release and
#          pushes the CocoaPods podspecs to trunk.
#   * Android: extracts the prebuilt .so from the AARs ("android build scripts" run)
#          and publishes the 5 variants to Maven Central via the vanniktech plugin.
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version, e.g. 6.0.5 (iOS release tag ios-<version> + CocoaPods version + Android Maven version)'
        required: true
        type: string
      publish_ios:
        description: 'Publish iOS (GitHub Release + CocoaPods trunk)'
        required: false
        type: boolean
        default: true
      publish_android:
        description: 'Publish Android to Maven Central'
        required: false
        type: boolean
        default: true
      ios_build_run_id:
        description: 'Optional: ios-build-scripts.yml run id to publish from (default: latest successful run on main)'
        required: false
        type: string
      android_build_run_id:
        description: 'Optional: android-build-scripts.yml run id to publish from (default: latest successful run on main)'
        required: false
        type: string

jobs:
  # ---------------------------------------------------------------------------
  # GITHUB RELEASE (shared by iOS + Android)
  # Reuses artifacts from the latest successful build workflows (no rebuild) and
  # publishes them to GitHub Releases. Each platform's steps are gated on the
  # publish_ios / publish_android toggles:
  #   * iOS    -> tag ios-<version>     : per-variant xcframework zips. The CocoaPods
  #              podspecs (cocoapods/*.podspec) point at these assets via :http, so
  #              this MUST exist before the cocoapods job runs.
  #   * Android-> tag android-<version> : per-variant .aar files for direct download
  #              (Maven Central is the primary channel; this is a convenience mirror
  #              and runs before the Maven publish).
  # ---------------------------------------------------------------------------
  publish-github-release:
    name: publish github release
    if: ${{ inputs.publish_ios || inputs.publish_android }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # create the release
      actions: read    # read artifacts from the build workflow's runs
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      # ----- iOS -----
      - name: download variant xcframeworks from the latest ios build
        if: ${{ inputs.publish_ios }}
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ github.token }}
          workflow: ios-build-scripts.yml
          # run_id and branch/workflow_conclusion are mutually exclusive in this action, so
          # only send the "latest successful on main" filters when no explicit run id is given.
          workflow_conclusion: ${{ inputs.ios_build_run_id == '' && 'success' || '' }}
          branch: ${{ inputs.ios_build_run_id == '' && 'main' || '' }}
          run_id: ${{ inputs.ios_build_run_id }}
          name: ^ios-.*-xcframework$
          name_is_regexp: true
          path: ios-artifacts
          if_no_artifact_found: fail
      - name: package each ios variant into a zip
        if: ${{ inputs.publish_ios }}
        run: |
          mkdir -p ios-dist
          for variant in min https audio video full; do
            src="ios-artifacts/ios-${variant}-xcframework"
            if [ ! -d "$src" ]; then
              echo "::error::missing artifact for variant ${variant} (${src})"; exit 1
            fi
            # the artifact may unpack with the xcframeworks at its root or nested under
            # bundle-apple-xcframework-ios, depending on upload-artifact's path handling
            if [ -d "${src}/bundle-apple-xcframework-ios" ]; then
              src="${src}/bundle-apple-xcframework-ios"
            fi
            # ship the LGPL license text inside each zip (referenced by the podspec's :file)
            cp LICENSE "${src}/LICENSE"
            ( cd "${src}" && zip -ry "${GITHUB_WORKSPACE}/ios-dist/ffmpeg-mobile-${variant}.zip" . )
          done
          ls -lh ios-dist
      - name: create or update ios github release
        if: ${{ inputs.publish_ios }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="ios-${{ inputs.release_version }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "iOS ${{ inputs.release_version }}" \
              --notes "Prebuilt FFmpegKit iOS xcframeworks (LGPL v3.0, no GPL libraries). Install via CocoaPods, e.g. pod 'ffmpeg-mobile-min', '~> ${{ inputs.release_version }}'."
          fi
          # --clobber so re-running the same version overwrites the existing assets
          gh release upload "$tag" ios-dist/*.zip --clobber

      # ----- Android -----
      - name: download variant aars from the latest android build
        if: ${{ inputs.publish_android }}
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ github.token }}
          workflow: android-build-scripts.yml
          workflow_conclusion: ${{ inputs.android_build_run_id == '' && 'success' || '' }}
          branch: ${{ inputs.android_build_run_id == '' && 'main' || '' }}
          run_id: ${{ inputs.android_build_run_id }}
          name: ^android-.*-aar$
          name_is_regexp: true
          path: android-artifacts
          if_no_artifact_found: fail
      - name: collect each android variant's aar
        if: ${{ inputs.publish_android }}
        run: |
          mkdir -p android-dist
          for variant in min https audio video full; do
            # each artifact contains bundle-android-aar/ffmpeg-kit/ffmpeg-kit.aar
            aar="$(find "android-artifacts/android-${variant}-aar" -name '*.aar' | head -n1)"
            if [ -z "${aar}" ]; then
              echo "::error::missing aar for variant ${variant}"; exit 1
            fi
            # name it per-variant + version so the assets are unambiguous on the release page
            cp "${aar}" "android-dist/ffmpeg-kit-${variant}-${{ inputs.release_version }}.aar"
          done
          ls -lh android-dist
      - name: create or update android github release
        if: ${{ inputs.publish_android }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="android-${{ inputs.release_version }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "Android ${{ inputs.release_version }}" \
              --notes "Prebuilt FFmpegKit Android AARs (LGPL v3.0, no GPL libraries). Primary install is via Maven Central, e.g. implementation 'io.github.maitrungduc1410:ffmpeg-kit-min:${{ inputs.release_version }}'. These .aar files are a direct-download mirror."
          fi
          gh release upload "$tag" android-dist/*.aar --clobber

  # ---------------------------------------------------------------------------
  # COCOAPODS TRUNK
  # Runs after the GitHub Release exists (the podspecs' :http source points at the
  # release assets, and trunk validation downloads them). Authenticates via the
  # COCOAPODS_TRUNK_TOKEN secret. Needs macOS because `pod trunk push` validates.
  # ---------------------------------------------------------------------------
  publish-cocoapods:
    name: publish cocoapods trunk
    if: ${{ inputs.publish_ios }}
    needs: publish-github-release
    runs-on: macos-26
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: push podspecs to cocoapods trunk
        env:
          # add this repo secret: the password/token from your ~/.netrc entry for
          # machine trunk.cocoapods.org (obtained via `pod trunk register`).
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          # podspecs read this to set s.version, which must match the release tag ios-<version>.
          POD_VERSION: ${{ inputs.release_version }}
        run: |
          if [ -z "${COCOAPODS_TRUNK_TOKEN}" ]; then
            echo "::error::COCOAPODS_TRUNK_TOKEN secret is not set"; exit 1
          fi

          # POD_VERSION as a literal-dot regex for matching `pod trunk info` output.
          ver_regex="${POD_VERSION//./\\.}"

          # Authoritative check: is this exact version actually live on trunk? `pod trunk push`
          # is unreliable for this - the trunk server frequently returns "internal server error" /
          # "GitHub commit API timed out" even though the spec was committed (and CocoaPods only
          # prints the "successfully published" banner / sends the email on the synchronous-success
          # path). So we never trust the push exit code; we ask trunk directly.
          pod_published() {
            pod trunk info "$1" 2>/dev/null | grep -qE "(^|[[:space:]-])${ver_regex}([[:space:]]|\()"
          }

          # Push with retries, using pod_published as the source of truth for success.
          push_pod() {
            local podspec="$1" name="$2"
            for attempt in 1 2 3 4; do
              echo "==> ${name} ${POD_VERSION} (attempt ${attempt})"
              # --skip-import-validation: don't build an app that imports the binary framework
              # --allow-warnings: binary-only pods commonly emit lint warnings
              # ignore the exit code on purpose; pod_published is what decides success
              pod trunk push "${podspec}" --allow-warnings --skip-import-validation || true
              if pod_published "${name}"; then
                echo "    -> ${name} ${POD_VERSION} confirmed live on trunk"
                return 0
              fi
              echo "    -> not on trunk yet; retrying in $((attempt * 15))s"
              sleep $((attempt * 15))
            done
            return 1
          }

          for variant in min https audio video full; do
            push_pod "cocoapods/ffmpeg-mobile-${variant}.podspec" "ffmpeg-mobile-${variant}" || true
            sleep 10  # space out pushes to ease the trunk GitHub-commit API throttling
          done

          # Final, authoritative summary - the only thing that determines the job result.
          echo ""
          echo "================ publish summary (${POD_VERSION}) ================"
          failed=()
          for variant in min https audio video full; do
            name="ffmpeg-mobile-${variant}"
            if pod_published "${name}"; then
              echo "  PUBLISHED  ${name} ${POD_VERSION}  ->  https://cocoapods.org/pods/${name}"
            else
              echo "  MISSING    ${name} ${POD_VERSION}"
              failed+=("${variant}")
            fi
          done
          echo "================================================================="

          if [ ${#failed[@]} -ne 0 ]; then
            echo "::error::not published on trunk: ${failed[*]}"; exit 1
          fi
          echo "All 5 podspecs are live on CocoaPods trunk."

  # ---------------------------------------------------------------------------
  # ANDROID MAVEN CENTRAL
  # One deployment per package (independent Maven artifacts: ffmpeg-kit-min, -https,
  # -audio, -video, -full). No native rebuild: each job pulls the variant's AAR from
  # the latest successful "android build scripts" run, extracts the prebuilt .so into
  # android/libs, then lets the vanniktech plugin rebuild the AAR + generate the
  # sources/javadoc/POM, GPG-sign everything and release it to the Central Portal.
  # ---------------------------------------------------------------------------
  publish-android-maven:
    name: publish android maven (${{ matrix.variant }})
    if: ${{ inputs.publish_android }}
    needs: publish-github-release  # GitHub release first, then Maven Central
    runs-on: ubuntu-22.04
    permissions:
      contents: read  # read artifacts from the build workflow's runs
      actions: read
    strategy:
      fail-fast: false
      matrix:
        variant: [ 'min', 'https', 'audio', 'video', 'full' ]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: set up temurin jdk 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: download this variant's aar from the latest android build
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ github.token }}
          workflow: android-build-scripts.yml
          # run_id and branch/workflow_conclusion are mutually exclusive in this action, so
          # only send the "latest successful on main" filters when no explicit run id is given.
          workflow_conclusion: ${{ inputs.android_build_run_id == '' && 'success' || '' }}
          branch: ${{ inputs.android_build_run_id == '' && 'main' || '' }}
          run_id: ${{ inputs.android_build_run_id }}
          name: android-${{ matrix.variant }}-aar
          path: artifacts
          if_no_artifact_found: fail

      - name: extract prebuilt .so from the aar into android/libs
        run: |
          aar="$(find artifacts -name '*.aar' | head -n1)"
          if [ -z "${aar}" ]; then
            echo "::error::no .aar found in the downloaded artifact for ${{ matrix.variant }}"; exit 1
          fi
          echo "using aar: ${aar}"
          rm -rf android/libs && mkdir -p android/libs
          # the aar stores native libs under jni/<abi>/lib*.so; jniLibs.srcDirs=["../libs"]
          # expects <libs>/<abi>/lib*.so, so copy the abi folders straight across.
          unzip -o "${aar}" 'jni/*' -d /tmp/aar_extract >/dev/null
          cp -r /tmp/aar_extract/jni/* android/libs/
          echo "android/libs contents:"
          ls -R android/libs

      - name: publish ${{ matrix.variant }} to maven central
        working-directory: android
        env:
          # Central Portal user token (central.sonatype.com -> Account -> Generate User Token)
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          # GPG signing (required by Maven Central). In-memory key works headless on CI.
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          if [ -z "${ORG_GRADLE_PROJECT_mavenCentralUsername}" ] || [ -z "${ORG_GRADLE_PROJECT_signingInMemoryKey}" ]; then
            echo "::error::missing MAVEN_CENTRAL_USERNAME/PASSWORD or GPG_SIGNING_KEY secrets"; exit 1
          fi
          chmod +x ./gradlew
          # publishAndReleaseToMavenCentral = upload + auto-release (no manual click on the portal)
          ./gradlew :ffmpeg-kit-android-lib:publishAndReleaseToMavenCentral \
            -PffmpegKitPackage=${{ matrix.variant }} \
            -PffmpegKitVersion=${{ inputs.release_version }} \
            --no-configuration-cache --stacktrace